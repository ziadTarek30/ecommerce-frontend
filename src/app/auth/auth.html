
  <!-- AUTH PAGE -->
  <div class="auth">
    <div class="auth__container">
      <div class="auth__logo">
        <a href="index.html" class="auth__logo-text">URBAN THREADS</a>
      </div>

      <!-- Tabs -->
      <div class="auth__tabs">
        <button class="auth__tab auth__tab--active" onclick="switchTab('login')">
          Login
        </button>
        <button class="auth__tab" onclick="switchTab('register')">
          Register
        </button>
      </div>

      <!-- Login Form -->
      <div id="login-form-container" class="auth__form-container">
        <h2 class="auth__title">Welcome Back</h2>
        <p class="auth__subtitle">Enter your credentials to access your account</p>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
          <div class="form__group">
            <label for="login-email" class="form__label">Email Address *</label>
            <input 
              type="email" 
              id="login-email" 
              class="form__input" 
              placeholder="your.email@example.com"
              required
              formControlName="email"
            >
          </div>

          <div class="form__group">
            <label for="login-password" class="form__label">Password *</label>
            <input 
              type="password" 
              id="login-password" 
              class="form__input" 
              placeholder="Enter your password"
              required
              formControlName="password"
            >
            <span class="form__helper">
              <a href="#" class="auth__link">Forgot password?</a>
            </span>
          </div>

          <div class="form__checkbox">
            <input type="checkbox" id="remember-me">
            <label for="remember-me">Remember me</label>
          </div>

          <button type="submit" class="btn btn--primary" style="width: 100%; margin-top: var(--spacing-md);">
            Login
          </button>
        </form>

        <div class="auth__divider">OR</div>

        <div style="display: flex; flex-direction: column; gap: var(--spacing-sm);">
          <button class="btn btn--secondary" style="width: 100%;">
            <span style="margin-right: var(--spacing-sm);">🔍</span>
            Continue with Google
          </button>
          <button class="btn btn--secondary" style="width: 100%;">
            <span style="margin-right: var(--spacing-sm);">👤</span>
            Continue with Facebook
          </button>
        </div>

        <p class="auth__footer">
          Don't have an account? 
          <a href="#" class="auth__link" onclick="switchTab('register'); return false;">Create one now</a>
        </p>
      </div>

      <!-- Registration Form -->
      <div id="register-form-container" class="auth__form-container" style="display: none;">
        <h2 class="auth__title">Create Account</h2>
        <p class="auth__subtitle">Join Urban Threads and start shopping</p>

        <form class="form" onsubmit="handleRegister(event)">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md);">
            <div class="form__group">
              <label for="register-first-name" class="form__label">First Name *</label>
              <input 
                type="text" 
                id="register-first-name" 
                class="form__input" 
                placeholder="John"
                required
              >
            </div>

            <div class="form__group">
              <label for="register-last-name" class="form__label">Last Name *</label>
              <input 
                type="text" 
                id="register-last-name" 
                class="form__input" 
                placeholder="Doe"
                required
              >
            </div>
          </div>

          <div class="form__group">
            <label for="register-email" class="form__label">Email Address *</label>
            <input 
              type="email" 
              id="register-email" 
              class="form__input" 
              placeholder="your.email@example.com"
              required
            >
          </div>

          <div class="form__group">
            <label for="register-password" class="form__label">Password *</label>
            <input 
              type="password" 
              id="register-password" 
              class="form__input" 
              placeholder="Create a strong password"
              minlength="8"
              required
            >
            <span class="form__helper">Minimum 8 characters</span>
          </div>

          <div class="form__group">
            <label for="register-confirm-password" class="form__label">Confirm Password *</label>
            <input 
              type="password" 
              id="register-confirm-password" 
              class="form__input" 
              placeholder="Re-enter your password"
              required
            >
          </div>

          <div class="form__checkbox">
            <input type="checkbox" id="agree-terms" required>
            <label for="agree-terms">
              I agree to the <a href="#" class="auth__link">Terms of Service</a> and 
              <a href="#" class="auth__link">Privacy Policy</a>
            </label>
          </div>

          <div class="form__checkbox">
            <input type="checkbox" id="subscribe-newsletter" checked>
            <label for="subscribe-newsletter">
              Subscribe to newsletter for exclusive offers
            </label>
          </div>

          <button type="submit" class="btn btn--primary" style="width: 100%; margin-top: var(--spacing-md);">
            Create Account
          </button>
        </form>

        <div class="auth__divider">OR</div>

        <div style="display: flex; flex-direction: column; gap: var(--spacing-sm);">
          <button class="btn btn--secondary" style="width: 100%;">
            <span style="margin-right: var(--spacing-sm);">🔍</span>
            Sign up with Google
          </button>
          <button class="btn btn--secondary" style="width: 100%;">
            <span style="margin-right: var(--spacing-sm);">👤</span>
            Sign up with Facebook
          </button>
        </div>

        <p class="auth__footer">
          Already have an account? 
          <a href="#" class="auth__link" onclick="switchTab('login'); return false;">Login here</a>
        </p>
      </div>
    </div>
  </div>
